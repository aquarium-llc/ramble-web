<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Join the Ramble Beta</title>
    <meta
      name="description"
      content="Sign up for Ramble's Android beta and get access to the Google Play internal test."
    />

    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon-precomposed" href="/apple-touch-icon.png" />
    <link rel="canonical" href="https://ramble.co/beta/" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        color-scheme: light dark;
        --background: #faf0ca;
        --background-glow: rgba(255, 255, 255, 0.55);
        --background-accent: rgba(0, 152, 255, 0.14);
        --panel: rgba(255, 252, 243, 0.84);
        --panel-border: rgba(0, 0, 0, 0.12);
        --text: #000000;
        --muted: rgba(0, 0, 0, 0.72);
        --input-bg: rgba(255, 255, 255, 0.9);
        --input-border: rgba(0, 0, 0, 0.14);
        --button-bg: #000000;
        --button-text: #faf0ca;
        --button-disabled: rgba(0, 0, 0, 0.38);
        --success-bg: #daf4e2;
        --success-text: #174832;
        --error-bg: #ffe4dc;
        --error-text: #7c2f1f;
        --link-bg: #bfe5ff;
        --link-text: #003b66;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: "Inconsolata", monospace;
        color: var(--text);
        background:
          radial-gradient(circle at top left, var(--background-glow), transparent 35%),
          radial-gradient(circle at bottom right, var(--background-accent), transparent 28%),
          var(--background);
      }

      .card {
        width: min(520px, 100%);
        padding: 28px;
        border: 1px solid var(--panel-border);
        border-radius: 24px;
        background: var(--panel);
        box-shadow: 0 24px 60px rgba(22, 48, 43, 0.14);
        backdrop-filter: blur(10px);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 18px;
      }

      .brand-mark {
        width: 52px;
        height: auto;
      }

      .brand-title {
        font-size: clamp(1.8rem, 4vw, 2.2rem);
        font-weight: 700;
        line-height: 1;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 5vw, 2.75rem);
        line-height: 0.96;
      }

      p {
        margin: 0 0 20px;
        font-size: 1.1rem;
        line-height: 1.45;
        color: var(--muted);
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-size: 0.95rem;
        font-weight: 700;
      }

      input,
      button,
      a.button {
        width: 100%;
        border-radius: 14px;
        font: inherit;
      }

      input {
        padding: 14px 16px;
        border: 1px solid var(--input-border);
        background: var(--input-bg);
        color: var(--text);
      }

      input::placeholder {
        color: rgba(22, 48, 43, 0.5);
      }

      button,
      a.button {
        margin-top: 14px;
        padding: 14px 16px;
        border: 0;
        text-align: center;
        text-decoration: none;
        font-weight: 700;
      }

      button {
        background: var(--button-bg);
        color: var(--button-text);
        cursor: pointer;
      }

      button:disabled {
        background: var(--button-disabled);
        cursor: wait;
      }

      #status {
        display: none;
        margin-top: 16px;
        padding: 12px 14px;
        border-radius: 14px;
        font-size: 0.98rem;
      }

      #status.error,
      #status.success,
      #status.pending {
        display: block;
      }

      #status.pending {
        background: rgba(22, 48, 43, 0.08);
        color: var(--text);
      }

      #status.error {
        background: var(--error-bg);
        color: var(--error-text);
      }

      #status.success {
        background: var(--success-bg);
        color: var(--success-text);
      }

      #storeLink {
        display: none;
        background: var(--link-bg);
        color: var(--link-text);
      }

      .fine-print {
        margin-top: 16px;
        font-size: 0.9rem;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --background: #2b1744;
          --background-glow: rgba(255, 255, 255, 0.08);
          --background-accent: rgba(164, 214, 247, 0.12);
          --panel: rgba(27, 16, 45, 0.82);
          --panel-border: rgba(255, 255, 255, 0.12);
          --text: #f7f1ff;
          --muted: rgba(247, 241, 255, 0.78);
          --input-bg: rgba(63, 37, 96, 0.7);
          --input-border: rgba(255, 255, 255, 0.18);
          --button-bg: #f7f1ff;
          --button-text: #2b1744;
          --button-disabled: rgba(247, 241, 255, 0.35);
          --success-bg: rgba(53, 117, 82, 0.35);
          --success-text: #d5ffe5;
          --error-bg: rgba(149, 56, 40, 0.42);
          --error-text: #ffd8d1;
          --link-bg: rgba(164, 214, 247, 0.18);
          --link-text: #d4edff;
        }
      }

      @media (max-width: 640px) {
        body {
          padding: 16px;
        }

        .card {
          padding: 22px;
          border-radius: 20px;
        }

        .brand-mark {
          width: 44px;
          height: auto;
        }

      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="brand" aria-hidden="true">
        <img src="/images/mascot-256.png" alt="" class="brand-mark" />
        <span class="brand-title">Ramble</span>
      </div>

      <h1>Join the Ramble Beta</h1>
      <p>
        Enter your email and we will add you to our beta tester group for Google
        Play internal testing.
      </p>

      <form id="signupForm">
        <label for="email">Email</label>
        <input
          id="email"
          name="email"
          type="email"
          autocomplete="email"
          placeholder="you@example.com"
          required
        />
        <button id="submitButton" type="submit">Join beta</button>
      </form>

      <a id="storeLink" class="button" target="_blank" rel="noreferrer">
        Open Ramble in Google Play
      </a>

      <div id="status" aria-live="polite"></div>

      <p class="fine-print">
        Been waiting a while? You can email <a href="mailto:support@ramble.co">support@ramble.co</a> and we’ll help.
      </p>
    </main>

    <script>
      const SIGNUP_ENDPOINT = "https://staging-api.ramble.co/android-beta-signup";
      const form = document.getElementById("signupForm");
      const emailInput = document.getElementById("email");
      const statusEl = document.getElementById("status");
      const submitButton = document.getElementById("submitButton");
      const storeLink = document.getElementById("storeLink");

      const setStatus = (type, message) => {
        statusEl.className = type;
        statusEl.textContent = message;
      };

      const readPayload = async (response) => {
        const responseText = await response.text();

        if (!responseText) {
          return {};
        }

        try {
          return JSON.parse(responseText);
        } catch (error) {
          return { message: responseText };
        }
      };

      form.addEventListener("submit", async (event) => {
        event.preventDefault();

        setStatus("pending", "Submitting...");
        storeLink.style.display = "none";
        submitButton.disabled = true;

        const email = emailInput.value.trim();

        try {
          const response = await fetch(SIGNUP_ENDPOINT, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email }),
          });

          const payload = await readPayload(response);

          if (!response.ok || !payload.success) {
            throw new Error(payload.message || "Signup failed.");
          }

          if (payload.appLink) {
            setStatus("success", payload.message || "Success!");
            storeLink.href = payload.appLink;
            storeLink.style.display = "block";
          } else {
            const approvalMessage = payload.message
              ? `${payload.message}`
              : "Thanks for signing up. We'll email you when you're approved.";

            setStatus("success", approvalMessage);
          }
        } catch (error) {
          setStatus("error", error.message || "Something went wrong.");
        } finally {
          submitButton.disabled = false;
        }
      });
    </script>
  </body>
</html>
