<p class="hero-intro">Time to talk to your friends... again.</p>

    <script>
      (() => {
        const isAndroid = (() => {
          const uaDataPlatform =
            navigator.userAgentData && typeof navigator.userAgentData.platform === "string"
              ? navigator.userAgentData.platform
              : "";

          return /android/i.test(uaDataPlatform) || /android/i.test(navigator.userAgent || "");
        })();

        const iosStoreRow = document.querySelector('[data-store-row="ios"]');
        const androidStoreRow = document.querySelector('[data-store-row="android"]');

        if (isAndroid && iosStoreRow && androidStoreRow) {
          iosStoreRow.before(androidStoreRow);
        }

        const prompts = [
          "Getting your steps in?",
          "Walking the dog?",
          "Commuting to work?",
          "Doing chores?"
        ];

        const promptEl = document.querySelector("[data-carousel-text]");

        if (!promptEl) {
          return;
        }

        let currentIndex = 0;

        window.setInterval(() => {
          promptEl.classList.add("is-transitioning");

          window.setTimeout(() => {
            currentIndex = (currentIndex + 1) % prompts.length;
            promptEl.textContent = prompts[currentIndex];
            promptEl.classList.remove("is-transitioning");
          }, 180);
        }, 2600);
      })();
    </script>
